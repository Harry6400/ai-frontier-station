name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Compile
        run: mvn -q -DskipTests compile
        working-directory: backend

  frontend-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend-portal/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend-portal
      - name: Build
        run: npm run build
        working-directory: frontend-portal

  frontend-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend-admin
      - name: Build
        run: npm run build
        working-directory: frontend-admin
