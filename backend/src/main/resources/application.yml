server:
  port: 8080

spring:
  application:
    name: ai-frontier-station-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_frontier_station?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  project-name: AI前沿情报站
  current-stage: 工程骨架初始化
  crypto:
    master-key: ${API_MASTER_KEY:ai-frontier-station-default-key-2024}
  jwt:
    secret: ${JWT_SECRET:ai-frontier-station-default-jwt-secret-key-2024}
    expiration: 86400000
  bailian:
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-plus
  github:
    token: ${GITHUB_TOKEN:}
    base-url: https://api.github.com
  mimo:
    api-key: ${MIMO_API_KEY:}
    base-url: https://token-plan-cn.xiaomimimo.com/v1
    model: mimo-v2.5-pro
